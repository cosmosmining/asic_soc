name: ci

# Lint + functional regression gate. Runs on every push and PR so no change
# lands without the differential test suite passing and the RTL linting clean.
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-regress:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install EDA tools (Icarus Verilog + Verilator)
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog verilator
          iverilog -V | head -1
          verilator --version

      - name: Lint (Verilator -Wall, zero warnings tolerated)
        run: make lint

      - name: Functional regression (both cores, directed + random)
        run: make regress SEEDS=150 INSTR=80

  # Best-effort generic synthesis: proves the RTL still elaborates to gates and
  # passes Yosys `check -assert`. Non-blocking (yosys availability varies).
  synth-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Yosys
        run: sudo apt-get update && sudo apt-get install -y yosys
      - name: Generic synthesis (pipeline) + area stat
        run: make synth
