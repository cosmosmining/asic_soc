name: ci

# Combined gate: verified RV32IM core (lint 0-warnings + differential regression)
# plus the four-track interview portfolio (riscv-soc / -dv / -dft / -pd).
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  core:
    name: core lint + differential regression (blocking)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus + Verilator
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog verilator python3
          iverilog -V | head -1
          verilator --version
      - name: Lint (core with waivers + portfolio blocks, 0 warnings)
        run: make lint
      - name: Functional regression (both cores, directed + random)
        run: make regress SEEDS=150 INSTR=80

  riscv-soc:
    name: riscv-soc track — sim + formal + synth (blocking)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Verilator + Icarus + Yosys + z3
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator iverilog yosys z3
      - name: SoC lint + sim + formal (FIFO/AXI/DMA)
        run: make -C riscv-soc all
      - name: Generic synthesis + latch-free check
        run: make -C riscv-soc synth

  dv:
    name: DV formal proofs — arbiter safety (blocking)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Yosys + z3
        run: sudo apt-get update && sudo apt-get install -y yosys z3
      - name: Arbiter grant mutual-exclusion + stability
        run: make dv

  dft-pd:
    name: DFT fault sim + PD timing CLI (blocking)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: DFT — C++ stuck-at fault simulator
        run: make dft
      - name: PD — STA timing-violation classifier
        run: make pd

  # Best-effort generic synthesis of the pipeline (Yosys check -assert). Advisory.
  synth-check:
    name: generic pipeline synthesis (advisory)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Yosys
        run: sudo apt-get update && sudo apt-get install -y yosys
      - name: Generic synthesis (pipeline) + area stat
        run: make synth
