name: ci

# The open-source gate: lint + differential regression + cocotb SoC test +
# formal proofs + register generation + SoC synthesis. Every stage returns a
# real exit code, so nothing lands without the flow passing.
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Install EDA toolchain (Icarus, Verilator, Yosys)
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog verilator yosys
          iverilog -V | head -1; verilator --version; yosys --version

      - name: Install Python flow tools (cocotb, PeakRDL, z3)
        run: |
          pip install --quiet cocotb cocotb-bus z3-solver \
            peakrdl peakrdl-regblock peakrdl-uvm peakrdl-cheader peakrdl-html

      - name: Install SymbiYosys (formal)
        run: |
          git clone --depth 1 https://github.com/YosysHQ/sby.git /tmp/sby
          sudo make -C /tmp/sby install
          sby --version | head -1

      - name: Lint (Verilator, 0 warnings)
        run: make lint

      - name: Register generation (PeakRDL)
        run: make regs

      - name: Functional regression (both cores, directed + random)
        run: make regress SEEDS=150 INSTR=80

      - name: SoC test (cocotb — UART + machine-timer interrupts)
        run: make sim-soc

      - name: Formal (ALU equivalence + pipeline safety BMC)
        run: make formal

      - name: SoC synthesis (Yosys, check -assert)
        run: make synth-soc

      - name: Metrics summary
        run: make metrics

      - name: Upload metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flow-summary
          path: reports/summary.json
          if-no-files-found: ignore
